spring:
  application:
    name: SocietyMS
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never

app:
  jwt:
    secret: 762856f9d9cca17db23cc281b624a7459362f340c4b489052b8430cb6437318d0fe4e3ae2f51357f8e51daf7a0bbcb01efc170fa7471e12cdf2a99f7529a04f2
    access-token-expiry-ms: 900000
    refresh-token-expiry-days: 30

  
  storage:
    upload-dir: ./uploads

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: WARN
    com.adityainfotech.societyms: INFO